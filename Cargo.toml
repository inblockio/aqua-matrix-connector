[package]
name = "aqua-matrix-agent"
version = "0.1.0"
edition = "2021"
description = "Matrix agent library and CLI for the Aqua Protocol, using siwx-oidc DID authentication"
license = "Apache-2.0"
repository = "https://github.com/inblockio/aqua-matrix-hello"

[lib]
name = "aqua_matrix_agent"

[[bin]]
name = "aqua-matrix-agent"
path = "src/main.rs"

[features]
e2e = ["dep:uuid"]

[dependencies]
uuid = { version = "1", features = ["v4"], optional = true }

siwx-oidc-auth = { path = "../siwx-oidc/siwx-oidc-auth" }
matrix-sdk = "0.17"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive", "env"] }
toml = "0.8"
